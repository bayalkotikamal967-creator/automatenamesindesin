<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1680" width="1200" height="1680">
  <defs>
    <!-- Paper background texture gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fdfcf9" />
      <stop offset="60%" stop-color="#faf5e7" />
      <stop offset="100%" stop-color="#f1e6cc" />
    </radialGradient>
    
    <!-- Shadow filters for warm depth -->
    <filter id="soft-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#543c2c" flood-opacity="0.12" />
    </filter>
    <filter id="badge-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="15" flood-color="#4a2614" flood-opacity="0.1" />
    </filter>

    <!-- Linear Gold gradient for premium highlights -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ab824a" />
      <stop offset="50%" stop-color="#ebd1a4" />
      <stop offset="100%" stop-color="#8d6433" />
    </linearGradient>

    <!-- Wooden board gradient -->
    <linearGradient id="wood-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#82512a" />
      <stop offset="100%" stop-color="#553012" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="1680" fill="url(#vignette)" />

  <!-- VINTAGE RETRO BORDERS -->
  <rect x="30" y="30" width="1140" height="1620" fill="none" stroke="#4a2614" stroke-width="5" rx="8" />
  <rect x="42" y="42" width="1116" height="1596" fill="none" stroke="#a17145" stroke-width="1.8" rx="6" />

  <!-- CORNER ORNAMENTAL SWIRLS (4 Corners) -->
  <!-- Top Left -->
  <g transform="translate(42, 42)">
    <path d="M 0 50 A 50 50 0 0 1 50 0" fill="none" stroke="#4a2614" stroke-width="2" />
    <circle cx="34" cy="34" r="4.5" fill="#4a2614" />
    <path d="M 12 40 C 15 30, 25 22, 38 31" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <path d="M 40 12 C 30 15, 22 25, 31 38" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <circle cx="12" cy="12" r="2.5" fill="#a17145" />
  </g>
  <!-- Top Right -->
  <g transform="translate(1158, 42) scale(-1, 1)">
    <path d="M 0 50 A 50 50 0 0 1 50 0" fill="none" stroke="#4a2614" stroke-width="2" />
    <circle cx="34" cy="34" r="4.5" fill="#4a2614" />
    <path d="M 12 40 C 15 30, 25 22, 38 31" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <path d="M 40 12 C 30 15, 22 25, 31 38" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <circle cx="12" cy="12" r="2.5" fill="#a17145" />
  </g>
  <!-- Bottom Left -->
  <g transform="translate(42, 1638) scale(1, -1)">
    <path d="M 0 50 A 50 50 0 0 1 50 0" fill="none" stroke="#4a2614" stroke-width="2" />
    <circle cx="34" cy="34" r="4.5" fill="#4a2614" />
    <path d="M 12 40 C 15 30, 25 22, 38 31" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <path d="M 40 12 C 30 15, 22 25, 31 38" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <circle cx="12" cy="12" r="2.5" fill="#a17145" />
  </g>
  <!-- Bottom Right -->
  <g transform="translate(1158, 1638) scale(-1, -1)">
    <path d="M 0 50 A 50 50 0 0 1 50 0" fill="none" stroke="#4a2614" stroke-width="2" />
    <circle cx="34" cy="34" r="4.5" fill="#4a2614" />
    <path d="M 12 40 C 15 30, 25 22, 38 31" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <path d="M 40 12 C 30 15, 22 25, 31 38" fill="none" stroke="#4a2614" stroke-width="1.5" />
    <circle cx="12" cy="12" r="2.5" fill="#a17145" />
  </g>

  <!-- 1. C CUBE COTTAGE LOGO BADGE (CENTER TOP) -->
  <g filter="url(#badge-shadow)">
    <!-- White Circle Backdrop -->
    <circle cx="600" cy="216" r="115" fill="#ffffff" />
  </g>

  <!-- Green Hexagon Outline inside Badge -->
  <g transform="translate(600, 206)">
    <polygon points="0,-75 65,-37.5 65,37.5 0,75 -65,37.5 -65,-37.5" fill="none" stroke="#2e5c1e" stroke-width="5" />
    <!-- Small Leaf elements scaling up the side -->
    <path d="M 60,-15 Q 85,-40 70,-60 Q 55,-35 60,-15" fill="#2e5c1e" />
    <path d="M 45,-45 Q 65,-70 50,-85 Q 35,-60 45,-45" fill="#2e5c1e" stroke="#ffffff" stroke-width="1.5" />
    
    <!-- Cottage Hut Vector in Coffee brown -->
    <!-- Roof -->
    <polygon points="-45,0 45,0 0,-35" fill="#5d4037" />
    <rect x="-4" y="-45" width="8" height="10" fill="#5d4037" />
    <!-- Pillars -->
    <rect x="-38" y="0" width="6" height="32" fill="#5d4037" />
    <rect x="32" y="0" width="6" height="32" fill="#5d4037" />
    <rect x="-3" y="0" width="6" height="32" fill="#5d4037" />
    <!-- Floor foundation -->
    <rect x="-44" y="27" width="88" height="5" fill="#5d4037" />
    
    <!-- Clay cup inside the hut -->
    <path d="M -8,11 L 8,11 L 6,25 L -6,25 Z" fill="#b45a03" />
    <line x1="-10" y1="11" x2="10" y2="11" stroke="#ffffff" stroke-width="1.5" />
    
    <!-- Steam threads -->
    <path d="M -3,5 Q -6,-1 -3,-5" fill="none" stroke="#8d6e63" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 3,5 Q 0,-1 3,-5" fill="none" stroke="#8d6e63" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Brand Typography (Rendered dynamically on canvas in design mode) -->
  <line x1="360" y1="382" x2="490" y2="382" stroke="#ebdcb9" stroke-width="1.5" />
  <line x1="710" y1="382" x2="840" y2="382" stroke="#ebdcb9" stroke-width="1.5" />

  <!-- 2. INVITATION HEADER SECTION (Rendered dynamically on canvas) -->


  <!-- Ornate Decorative Flowing Dividers (Exactly like the attached photo) -->
  <g transform="translate(600, 472)" fill="#8a623a" stroke="#8a623a">
    <line x1="-120" y1="0" x2="-20" y2="0" stroke-width="1.8" />
    <circle cx="-120" cy="0" r="4.5" />
    <circle cx="-80" cy="0" r="2.5" />
    
    <line x1="20" y1="0" x2="120" y2="0" stroke-width="1.8" />
    <circle cx="120" cy="0" r="4.5" />
    <circle cx="80" cy="0" r="2.5" />

    <!-- Three leaf motifs in center -->
    <path d="M 0,-4 Q -12,-15 0,-22 Q 12,-15 0,-4" />
    <path d="M 0,0 Q -10,8 -20,1 Q -15,12 0,0" transform="rotate(-15)" opacity="0.85" />
    <path d="M 0,0 Q 10,8 20,1 Q 15,12 0,0" transform="rotate(15)" opacity="0.85" />
  </g>

  <!-- Giant GRAND Opening Headers (Rendered dynamically on canvas) -->


  <!-- Premium Ribbon flat Banner - INVITATION -->
  <g transform="translate(600, 650)">
    <!-- Flat design dark brown banner -->
    <path d="M -290,12 L 0,0 L 290,12 L 278,60 L 0,72 L -278,60 Z" fill="#3e1e0a" />
    <!-- Fine inner gold frame line -->
    <path d="M -282,16 L 0,4 L 282,16 L 272,56 L 0,68 L -272,56 Z" fill="none" stroke="#d5ac6d" stroke-width="1.8" />


    <!-- Ribbon side embellishments (Gold Swallowtail branch shapes) -->
    <!-- Left Swallowtail decoration -->
    <g transform="translate(-315, 36)" fill="#c29759">
      <circle cx="0" cy="0" r="4.5" />
      <path d="M -2,0 C -12,-8 -22,-4 -28,4 C -18,0 -8,-2 -2,0" />
      <path d="M -2,0 C -12,8 -22,4 -28,-4 C -18,0 -8,2 -2,0" />
    </g>
    <!-- Right Swallowtail decoration -->
    <g transform="translate(315, 36) scale(-1, 1)" fill="#c29759">
      <circle cx="0" cy="0" r="4.5" />
      <path d="M -2,0 C -12,-8 -22,-4 -28,4 C -18,0 -8,-2 -2,0" />
      <path d="M -2,0 C -12,8 -22,4 -28,-4 C -18,0 -8,2 -2,0" />
    </g>
  </g>

  <!-- 3. SALUTATION GUEST SPACE (DEAR MR./MRS. _____________) -->
  <!-- Underline across -->
  <line x1="380" y1="786" x2="1010" y2="786" stroke="#5d4037" stroke-width="1.6" />


  <!-- 4. WARM INVITATION BODY TEXT -->
  <g transform="translate(80, 825)" fill="#442a1a">
  </g>

  <!-- 5. BENTO INFRASTRUCTURE INFORMATION PANELS (LEFT SIDE) -->
  <!-- Rounded envelope box containing Location, Date, Time (Enlarged with proper spacing) -->
  <g transform="translate(80, 1000)" filter="url(#soft-shadow)">
    <!-- Light warm framing plate (Enlarged width and height) -->
    <rect width="620" height="360" rx="20" fill="#fcf5e7" stroke="#e9dba4" stroke-width="1.6" />
    
    <!-- Panel Separator line 1 (Wider spaced) -->
    <line x1="12" y1="120" x2="608" y2="120" stroke="#e2d4ae" stroke-dasharray="4, 4" stroke-width="1.5" />
    <!-- Panel Separator line 2 (Wider spaced) -->
    <line x1="12" y1="240" x2="608" y2="240" stroke="#e2d4ae" stroke-dasharray="4, 4" stroke-width="1.5" />

    <!-- A. LOCATION ROW (Better vertical spacing) -->
    <g transform="translate(25, 36)">
      <!-- Map Pin Icon -->
      <circle cx="28" cy="24" r="24" fill="#3e1e0a" />
      <path d="M 28,12 C 23.5,12 20,15.5 20,20 C 20,26 28,34 28,34 C 28,34 36,26 36,20 C 36,15.5 32.5,12 28,12 Z M 28,23 C 26.3,23 25,21.7 25,20 C 25,18.3 26.3,17 28,17 C 29.7,17 31,18.3 31,20 C 31,21.7 29.7,23 28,23 Z" fill="#ffffff" />
    </g>

    <!-- B. DATE ROW (Better vertical spacing) -->
    <g transform="translate(25, 156)">
      <!-- Calendar Icon badge -->
      <circle cx="28" cy="24" r="24" fill="#3e1e0a" />
      <rect x="18" y="14" width="20" height="20" rx="3" fill="#ffffff" />
      <rect x="18" y="14" width="20" height="5" fill="#e06666" />
      <!-- Small grid dots in calendar icon -->
      <circle cx="22" cy="24" r="1.5" fill="#3e1e0a" />
      <circle cx="28" cy="24" r="1.5" fill="#3e1e0a" />
      <circle cx="34" cy="24" r="1.5" fill="#3e1e0a" />
      <circle cx="22" cy="29" r="1.5" fill="#3e1e0a" />
      <circle cx="28" cy="29" r="1.5" fill="#3e1e0a" />
      <circle cx="34" cy="29" r="1.5" fill="#3e1e0a" />
      <!-- Binder rings -->
      <line x1="22" y1="11" x2="22" y2="15" stroke="#3e1e0a" stroke-width="2.5" stroke-linecap="round" />
      <line x1="34" y1="11" x2="34" y2="15" stroke="#3e1e0a" stroke-width="2.5" stroke-linecap="round" />
    </g>

    <!-- C. TIME ROW (Better vertical spacing) -->
    <g transform="translate(25, 276)">
      <!-- Clock Icon badge -->
      <circle cx="28" cy="24" r="24" fill="#3e1e0a" />
      <circle cx="28" cy="24" r="14" fill="none" stroke="#ffffff" stroke-width="2.5" />
      <line x1="28" y1="24" x2="28" y2="16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
      <line x1="28" y1="24" x2="35" y2="24" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </g>

  <!-- 6. THE EXQUISITE TEA CUP WITH STEAM & WOODEN SAUCER (BOTTOM RIGHT) -->
  <g transform="translate(860, 1070)" filter="url(#soft-shadow)">
    <!-- A. Wooden saucer base board -->
    <ellipse cx="20" cy="184" rx="250" ry="85" fill="url(#wood-grad)" stroke="#411f05" stroke-width="4" />
    <ellipse cx="20" cy="179" rx="244" ry="79" fill="none" stroke="#ab824a" stroke-width="2" opacity="0.35" />
    <!-- Table shadow -->
    <ellipse cx="20" cy="188" rx="250" ry="81" fill="none" stroke="#2c1503" stroke-width="2" />

    <!-- Wooden ring circles of timber grains -->
    <ellipse cx="20" cy="184" rx="190" ry="60" fill="none" stroke="#4a2614" stroke-width="1.2" opacity="0.4" />
    <ellipse cx="20" cy="184" rx="130" ry="40" fill="none" stroke="#4a2614" stroke-width="1.2" opacity="0.4" />

    <!-- Ceramic Saucer Plate and Shadow -->
    <ellipse cx="14" cy="144" rx="195" ry="65" fill="#d2c4ae" opacity="0.18" />
    <ellipse cx="14" cy="139" rx="190" ry="60" fill="#fdfbfa" stroke="#d5c4ae" stroke-width="1.8" />
    <!-- Plate inner rim ring -->
    <ellipse cx="14" cy="139" rx="120" ry="38" fill="none" stroke="#ebdcb9" stroke-width="3" />
    <ellipse cx="14" cy="139" rx="120" ry="38" fill="none" stroke="#5d4037" stroke-width="1.2" opacity="0.4" />

    <!-- B. Dotted Speckled Ceramic Cup of Tea -->
    <!-- Cup Shadow -->
    <ellipse cx="14" cy="120" rx="110" ry="35" fill="#1e1008" opacity="0.18" />
    
    <!-- Cup handle -->
    <path d="M 115,80 C 160,80 160,140 110,135" fill="none" stroke="#fdfbfa" stroke-width="21" stroke-linecap="round" />
    <path d="M 115,80 C 160,80 160,140 110,135" fill="none" stroke="#ebd1a4" stroke-width="17" stroke-linecap="round" />
    <path d="M 115,80 C 160,80 160,140 110,135" fill="none" stroke="#d5c4ae" stroke-width="2" stroke-linecap="round" opacity="0.5" />

    <!-- Cup Body -->
    <path d="M -102,94 C -102,142 -55,152 14,152 C 83,152 130,142 130,94 C 130,68 130,55 130,52 C -102,52 -102,68 -102,94 Z" fill="#fdfbfa" stroke="#d5c4ae" stroke-width="2.5" />
    
    <!-- Golden logo miniature on the center wall of the cup -->
    <g transform="translate(14, 102) scale(0.55)">
      <polygon points="0,-40 32,-20 32,20 0,40 -32,20 -32,-20" fill="none" stroke="#2e5c1e" stroke-width="3" />
      <polygon points="-22,0 22,0 0,-18" fill="#5d4037" />
      <rect x="-18" y="0" width="3" height="15" fill="#5d4037" />
      <rect x="15" y="0" width="3" height="15" fill="#5d4037" />
      <rect x="-2" y="0" width="4" height="15" fill="#5d4037" />
    </g>

    <!-- Ceramic Cup Lip Rim Oval -->
    <ellipse cx="14" cy="52" rx="116" ry="24" fill="#fdfbfa" stroke="#d5c4ae" stroke-width="1.5" />
    <!-- Inner tea edge border -->
    <ellipse cx="14" cy="52" rx="108" ry="19" fill="#a17145" stroke="#5d4037" stroke-width="1" />
    <!-- Rich milk tea chai liquid center -->
    <ellipse cx="14" cy="52" rx="104" ry="16" fill="#ca9d6c" />
    <!-- Creamy chai bubbles/froth highlight ring -->
    <ellipse cx="14" cy="50" rx="98" ry="12" fill="none" stroke="#f4e3cf" stroke-width="2.5" stroke-dasharray="14, 25" opacity="0.8" />
    <ellipse cx="14" cy="50" rx="95" ry="10" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="8, 30" opacity="0.6" />

    <!-- Fine steam curling up gracefully (Three paths with glowing effects) -->
    <path d="M 0,-12 Q -22,-60 8,-115 T -15,-180" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.18" filter="blur(2px)" />
    <path d="M 0,-12 Q -22,-60 8,-115 T -15,-180" fill="none" stroke="#faf5e8" stroke-width="1.8" stroke-linecap="round" opacity="0.45" />

    <path d="M 32,-16 Q 10,-70 42,-120 T 15,-185" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.15" filter="blur(2px)" />
    <path d="M 32,-16 Q 10,-70 42,-120 T 15,-185" fill="none" stroke="#faf5e8" stroke-width="1.5" stroke-linecap="round" opacity="0.45" />
  </g>

  <!-- C. Torn-Paper corner graphic with script writing at bottom-right corner -->
  <g transform="translate(580, 1220)">
    <!-- Beveled deep onyx shadow backing -->
    <path d="M 590,0 L 590,460 L 0,460 Q 60,330 150,280 Q 250,210 350,140 Q 450,80 520,40 Q 565,15 590,0 Z" fill="#0c0402" opacity="0.22" transform="translate(-6, -4)" />
    <!-- Torn paper chocolate color (highly enriched dark wood cocoa) -->
    <path d="M 590,0 L 590,460 L 0,460 Q 60,330 150,280 Q 250,210 350,140 Q 450,80 520,40 Q 565,15 590,0 Z" fill="#200d04" />
    <!-- Dynamic fine gold torn margin line -->
    <path d="M 590,0 L 590,460 L 0,460 Q 60,330 150,280 Q 250,210 350,140 Q 450,80 520,40 Q 565,15 590,0 Z" fill="none" stroke="#ca9d6c" stroke-width="2.8" />
    
    <!-- Heart outline symbol at the very tail -->
    <path d="M 550,420 Q 544,411 538,420 Q 532,411 526,420 Q 526,424 538,434 Q 550,424 550,420 Z" fill="none" stroke="#eae1cb" stroke-width="1.8" />
  </g>

  <!-- D. Left-Bottom cozy torn paper / cocoa plate so Warm Regards fits perfectly within -->
  <g transform="translate(36, 1410)">
    <!-- Shadow backing -->
    <path d="M 0,270 L 0,0 L 560,0 Q 520,60 480,110 Q 440,160 420,185 Q 400,210 320,270 Z" fill="#0c0402" opacity="0.22" transform="translate(4, 4)" />
    <!-- Rich cocoa background -->
    <path d="M 0,270 L 0,0 L 560,0 Q 520,60 480,110 Q 440,160 420,185 Q 400,210 320,270 Z" fill="#200d04" />
    <!-- Gold accent line -->
    <path d="M 0,270 L 0,0 L 560,0 Q 520,60 480,110 Q 440,160 420,185 Q 400,210 320,270 Z" fill="none" stroke="#ca9d6c" stroke-width="2.5" />
  </g>

  <!-- 7. WARM REGARDS SIGNATURE (BOTTOM LEFT) -->
  <g transform="translate(80, 1485)" fill="#fff4e0">
    <!-- Small coffee/tea mug with a golden heart symbol inside plate -->
    <g transform="translate(390, 68)">
      <path d="M 0,10 L 32,10 L 28,32 L 4,32 Z" fill="#ca9d6c" />
      <path d="M 32,14 C 40,14 40,26 30,26" fill="none" stroke="#ca9d6c" stroke-width="3" />
      <ellipse cx="16" cy="10" rx="16" ry="4" fill="#ffffff" />
      <ellipse cx="16" cy="10" rx="13" ry="2.5" fill="#ca9d6c" />
      <!-- Swirl of steam with luxury white heat line -->
      <path d="M 12,2 Q 10,-4 13,-8" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.8" />
      <path d="M 20,2 Q 18,-4 21,-8" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.8" />
    </g>
    <!-- Warm amber/gold love heart -->
    <path d="M 464,80 Q 457,72 450,80 Q 443,72 436,80 Q 436,88 450,98 Q 464,88 464,80 Z" fill="#ca9d6c" />
  </g>
</svg>
